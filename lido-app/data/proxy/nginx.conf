server {
  listen 80;

  location / {
    proxy_pass http://lido-app_web_1:3000;
  }

  location /api/logs/stream {
    proxy_pass http://lido-app_server_1:2019;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
  }

  location ~* ^/api/ {
    proxy_pass http://lido-app_server_1:2019;
  }
}
